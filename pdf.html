<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>專業版 PDF 商品提取器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; padding: 20px; }
        .setup-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; max-height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
        .page-item { border: 2px solid #eee; padding: 5px; text-align: center; border-radius: 8px; cursor: pointer; position: relative; }
        .page-item.selected { border-color: #007bff; background: #e7f1ff; }
        .page-item canvas { width: 100%; border-radius: 4px; }
        .page-item input { position: absolute; top: 5px; left: 5px; width: 18px; height: 18px; }
        #log-panel { background: #222; color: #0f0; padding: 15px; border-radius: 8px; font-family: monospace; height: 300px; overflow-y: auto; }
        .step-title { font-weight: bold; margin: 20px 0 10px; color: #333; }
        button { background: #007bff; color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="setup-card">
    <h2>🛠 專業 PDF 提取系統</h2>
    
    <div class="step-title">第一步：選取檔案並挑選頁面</div>
    <input type="file" id="pdf-file" accept="application/pdf">
    
    <div id="preview-container" style="display:none;">
        <div class="preview-grid" id="thumbnail-grid"></div>
        <div style="margin-top: 15px;">
            <button id="start-scan">開始掃描勾選頁面</button>
        </div>
    </div>
</div>

<div class="setup-card">
    <div class="step-title">第二步：掃描結果 (自動過濾 6 位數編號)</div>
    <div id="log-panel">尚未開始掃描...</div>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let currentPdf = null;

    document.getElementById('pdf-file').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const arrayBuffer = await file.arrayBuffer();
        currentPdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        
        const grid = document.getElementById('thumbnail-grid');
        grid.innerHTML = '';
        document.getElementById('preview-container').style.display = 'block';

        for (let i = 1; i <= currentPdf.numPages; i++) {
            const page = await currentPdf.getPage(i);
            const viewport = page.getViewport({ scale: 0.2 });
            
            const div = document.createElement('div');
            div.className = 'page-item';
            div.onclick = () => {
                const cb = div.querySelector('input');
                cb.checked = !cb.checked;
                div.classList.toggle('selected', cb.checked);
            };

            const canvas = document.createElement('canvas');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            const ctx = canvas.getContext('2d');
            await page.render({ canvasContext: ctx, viewport: viewport }).promise;

            div.innerHTML = `<input type="checkbox" value="${i}"><div>P.${i}</div>`;
            div.prepend(canvas);
            grid.appendChild(div);
        }
    });

    document.getElementById('start-scan').addEventListener('click', async () => {
        const selectedPages = Array.from(document.querySelectorAll('.page-item input:checked')).map(cb => parseInt(cb.value));
        const log = document.getElementById('log-panel');
        log.innerText = "開始提取文字資料...\n";

        for (const pageNum of selectedPages) {
            log.innerText += `正在處理第 ${pageNum} 頁...\n`;
            const page = await currentPdf.getPage(pageNum);
            const textContent = await page.getTextContent();
            
            // 關鍵優化：依照座標排序文字（由上到下，由左到右）
            const items = textContent.items.sort((a, b) => {
                if (Math.abs(a.transform[5] - b.transform[5]) < 5) { // 同一行
                    return a.transform[4] - b.transform[4];
                }
                return b.transform[5] - a.transform[5]; // 不同行
            });

            const rawText = items.map(item => item.str).join(' ');
            
            // 使用正規表示式提取
            const regex = /(\d{6})\s+([^\d\n\r]{2,})/g;
            let match;
            while ((match = regex.exec(rawText)) !== null) {
                log.innerText += `✔️ [找到] ${match[1]} ${match[2].trim().substring(0, 20)}\n`;
            }
        }
        log.innerText += "\n--- 掃描結束 ---";
    });
</script>

</body>
</html>
