<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>零售手冊精準提取系統 - 完整版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
    <style>
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #f4f7f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #2c3e50; border-left: 5px solid #007bff; padding-left: 15px; }
        
        /* 預覽與頁面選取 */
        .preview-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 15px; margin: 15px 0; max-height: 300px; overflow-y: auto; 
            border: 2px solid #e9ecef; padding: 15px; border-radius: 10px; background: #fafafa;
        }
        .page-item { border: 2px solid #dee2e6; padding: 8px; text-align: center; border-radius: 8px; cursor: pointer; position: relative; transition: 0.2s; background: white; }
        .page-item:hover { border-color: #007bff; }
        .page-item.selected { border-color: #007bff; background: #e7f1ff; box-shadow: 0 2px 8px rgba(0,123,255,0.2); }
        .page-item canvas { width: 100%; border-radius: 4px; display: block; }
        .page-item input { position: absolute; top: 8px; left: 8px; transform: scale(1.3); }

        /* 按鈕與控制 */
        .btn-group { display: flex; gap: 12px; margin: 20px 0; align-items: center; }
        .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 15px; transition: 0.3s; }
        .btn-primary { background: #007bff; color: white; }
        .btn-primary:hover { background: #0056b3; }
        .btn-ai { background: #6f42c1; color: white; }
        .btn-ai:hover { background: #59359a; }
        .btn:disabled { background: #adb5bd; cursor: not-allowed; }
        #status { font-weight: bold; color: #007bff; margin-left: 10px; }

        /* 結果顯示 */
        .output-container { position: relative; }
        #log-panel { 
            background: #272822; color: #f8f8f2; padding: 20px; border-radius: 10px; 
            font-family: "Cascadia Code", "Consolas", monospace; height: 500px; 
            overflow-y: auto; white-space: pre-wrap; line-height: 1.6; font-size: 14px;
        }
        .copy-btn { position: absolute; top: 10px; right: 25px; background: #495057; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>📦 零售手冊編碼精準提取系統</h2>
        <p>步驟：1. 載入 PDF → 2. 勾選欲處理頁面（如第 10 頁） → 3. 點擊「座標重整掃描」</p>
        <input type="file" id="file-input" accept="application/pdf">
        
        <div id="preview-section" style="display:none;">
            <div class="preview-grid" id="thumbnail-grid"></div>
            <div class="btn-group">
                <button id="btn-text-scan" class="btn btn-primary">🎯 座標重整掃描 (推薦)</button>
                <button id="btn-ocr-scan" class="btn btn-ai">👁 AI 視覺辨識 (備援)</button>
                <span id="status">準備就緒</span>
            </div>
        </div>
    </div>

    <div class="card output-container">
        <button class="copy-btn" onclick="copyResult()">複製結果</button>
        <div id="log-panel">掃描結果將會顯示在這裡...</div>
    </div>
</div>

<canvas id="hidden-canvas" style="display:none;"></canvas>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let currentPdf = null;
    const fileInput = document.getElementById('file-input');
    const thumbnailGrid = document.getElementById('thumbnail-grid');
    const logPanel = document.getElementById('log-panel');
    const statusText = document.getElementById('status');
    const hiddenCanvas = document.getElementById('hidden-canvas');

    // 1. 檔案讀取與預覽產生
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        statusText.innerText = "讀取中...";
        const arrayBuffer = await file.arrayBuffer();
        currentPdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        
        thumbnailGrid.innerHTML = '';
        document.getElementById('preview-section').style.display = 'block';

        for (let i = 1; i <= currentPdf.numPages; i++) {
            const page = await currentPdf.getPage(i);
            const viewport = page.getViewport({ scale: 0.15 });
            
            const div = document.createElement('div');
            div.className = 'page-item';
            div.innerHTML = `<input type="checkbox" value="${i}"><div style="font-size:12px; margin-top:5px;">第 ${i} 頁</div>`;
            
            const canvas = document.createElement('canvas');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
            
            div.prepend(canvas);
            div.onclick = (evt) => {
                if(evt.target.tagName !== 'INPUT') {
                    const cb = div.querySelector('input');
                    cb.checked = !cb.checked;
                }
                div.classList.toggle('selected', div.querySelector('input').checked);
            };
            thumbnailGrid.appendChild(div);
        }
        statusText.innerText = "已載入 " + currentPdf.numPages + " 頁";
        logPanel.innerText = "檔案載入成功。請勾選頁面後開始掃描。";
    });

    // 2. 核心提取邏輯 (針對零售格式優化)
    function processTextItems(items) {
        // A. 座標分行 (容許 6 像素內的高度誤差)
        let rows = [];
        items.forEach(item => {
            let text = item.str.trim();
            if (!text) return;
            
            let y = item.transform[5];
            let x = item.transform[4];
            
            let row = rows.find(r => Math.abs(r.y - y) < 6);
            if (row) {
                row.data.push({ x, text });
            } else {
                rows.push({ y, data: [{ x, text }] });
            }
        });

        // B. 排序與提取
        rows.sort((a, b) => b.y - a.y); // 從上到下
        let extracted = [];

        rows.forEach(row => {
            row.data.sort((a, b) => a.x - b.x); // 從左到右拼湊文字
            let lineText = row.data.map(d => d.text).join(" ");
            
            // Regex: 尋找 6 位數字開頭
            const regex = /(\d{6})\s+([\u4e00-\u9fa5A-Za-z0-9\(\)（）\-\.\+]+)/g;
            let m;
            while ((m = regex.exec(lineText)) !== null) {
                let code = m[1];
                let name = m[2];

                // 智慧過濾：如果品名後方跟著純數字(價格)，將其切除
                // 邏輯：擷取直到遇到兩個空格或明顯的數字區塊
                name = name.split(/\s{2,}/)[0]; 
                
                // 排除純數字的錯誤抓取
                if (name.length > 1 && !/^\d+$/.test(name)) {
                    extracted.push(`${code} ${name}`);
                }
            }
        });
        return extracted;
    }

    // 模式一：座標重整掃描
    document.getElementById('btn-text-scan').addEventListener('click', async () => {
        const pages = Array.from(document.querySelectorAll('.page-item input:checked')).map(cb => parseInt(cb.value));
        if (pages.length === 0) return alert("請先勾選頁面！");

        logPanel.innerText = "🚀 開始座標重整掃描...\n";
        for (const num of pages) {
            statusText.innerText = `掃描第 ${num} 頁...`;
            const page = await currentPdf.getPage(num);
            const content = await page.getTextContent();
            const results = processTextItems(content.items);
            
            if(results.length > 0) {
                logPanel.innerText += `\n--- 第 ${num} 頁 ---\n` + results.join('\n') + '\n';
            }
        }
        statusText.innerText = "掃描完成";
    });

    // 模式二：AI 視覺辨識 (OCR)
    document.getElementById('btn-ocr-scan').addEventListener('click', async () => {
        const pages = Array.from(document.querySelectorAll('.page-item input:checked')).map(cb => parseInt(cb.value));
        if (pages.length === 0) return alert("請先勾選頁面！");

        logPanel.innerText = "🤖 啟動 AI 辨識引擎...\n";
        const worker = await Tesseract.createWorker({
            logger: m => { if(m.status === 'recognizing text') statusText.innerText = `AI 辨識中: ${Math.floor(m.progress*100)}%`; }
        });
        await worker.loadLanguage('chi_tra+eng');
        await worker.initialize('chi_tra+eng');

        for (const num of pages) {
            const page = await currentPdf.getPage(num);
            const vp = page.getViewport({ scale: 2.0 });
            hiddenCanvas.height = vp.height;
            hiddenCanvas.width = vp.width;
            await page.render({ canvasContext: hiddenCanvas.getContext('2d'), viewport: vp }).promise;

            const { data: { text } } = await worker.recognize(hiddenCanvas);
            
            // OCR 後的文字通常是一行一行的，我們可以直接對文字流做掃描
            const lines = text.split('\n');
            let found = [];
            lines.forEach(line => {
                const regex = /(\d{6})\s+([^\d\n\r]{2,})/;
                let m = line.match(regex);
                if(m) {
                    let name = m[2].trim().split(/\s{2,}/)[0];
                    found.push(`${m[1]} ${name}`);
                }
            });

            logPanel.innerText += `\n--- 第 ${num} 頁 [AI模式] ---\n` + found.join('\n') + '\n';
        }
        await worker.terminate();
        statusText.innerText = "AI 完成";
    });

    function copyResult() {
        navigator.clipboard.writeText(logPanel.innerText);
        alert("結果已複製到剪貼簿");
    }
</script>

</body>
</html>
